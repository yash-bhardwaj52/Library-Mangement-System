<!DOCTYPE html>
<html lang="en">    
<head>
  <meta charset="UTF-8">
  <title>Library Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;  
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('1.webp') no-repeat center center/cover;
      overflow: hidden;
    }

    /* Page Turn Effect */
    .page {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 1s ease-in-out;
      transform-origin: left center;
    }

    .page.turn {
      transform: rotateY(-180deg);
    }

    /* Glassmorphism Login Container */
    .container {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      width: 380px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      animation: fadeIn 1s ease-in-out;
      border: 1px solid rgba(255,255,255,0.3);
    }

    h1 {
      text-align: center;
      font-size: 30px;
      margin-bottom: 20px;
      color: #fff;
      font-weight: 700;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      display: block;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
      background: rgba(255,255,255,0.8);
    }

    input:focus, select:focus {
      box-shadow: 0 0 8px rgba(255,255,255,0.8);
    }

    /* Password Box with toggle */
    .password-box {
      position: relative;
    }
    .password-box input {
      padding-right: 40px;
    }
    .toggle-password {
      position: absolute;
      top: 38%;
      right: 12px;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 18px;
      color: #333;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      color: white;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s ease-in-out;
    }

    button:hover {
      background: linear-gradient(135deg, #ff6a3d, #fd9f67);
      transform: scale(1.05);
      box-shadow: 0 6px 15px rgba(0,0,0,0.3);
    }

    .forgot {
      text-align: right;
      margin-top: -10px;
      margin-bottom: 15px;
    }
    .forgot a {
      color: #ffd369;
      font-size: 13px;
      text-decoration: none;
    }
    .forgot a:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }

    /* === Corner Animation === */
    .corner-animation {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      background: url('book.png') no-repeat center/contain; /* small book image */
      animation: floatBook 3s ease-in-out infinite;
      opacity: 0.9;
    }

    @keyframes floatBook {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(10deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }
  </style>
</head>
<body>
  <div class="page" id="page">
    <div class="container">
      <h1>📚 Library Login</h1>
      <form id="loginForm">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" required>
        
        <label>Password</label>
        <div class="password-box">
          <input type="password" id="password" placeholder="Enter password" required>
          <span class="toggle-password" onclick="togglePassword()">👁</span>
        </div>

        <div class="forgot">
          <a href="#">Forgot Password?</a>
        </div>
        
        <label>Role</label>
        <select id="role">
          <option>User</option>
          <option>Admin</option>
        </select>
        
        <button type="submit">Login</button>
      </form>
    </div>
  </div>

  <!-- Floating animated book in corner -->
  <div class="corner-animation"></div>

  <script>
    const form = document.getElementById("loginForm");
    const page = document.getElementById("page");

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      page.classList.add("turn");

      const role = document.getElementById("role").value;
      setTimeout(() => {
        if (role === "Admin") {
          window.location.href = "admin.html";
        } else {
          window.location.href = "user.html";
        }
      }, 1000);
    });

    // Show/Hide Password
    function togglePassword() {
      const passwordInput = document.getElementById("password");
      const toggleIcon = document.querySelector(".toggle-password");
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleIcon.textContent = "🙈";
      } else {
        passwordInput.type = "password";
        toggleIcon.textContent = "👁";
      }
    }
  </script>
</body>
</html>
