<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library Login</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Poppins",sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      linear-gradient(rgba(0,0,0,0.5),
      rgba(0,0,0,0.7)),
      url('1.webp') no-repeat center center/cover;
      overflow:hidden;
    }

    /* PAGE TURN */

    .page{
      position:absolute;
      width:100%;
      height:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      transition:1s ease-in-out;
      transform-origin:left center;
    }

    .page.turn{
      transform:rotateY(-180deg);
    }

    /* LOGIN BOX */

    .container{
      width:380px;
      padding:40px;
      border-radius:20px;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.3);
      box-shadow:0 8px 30px rgba(0,0,0,0.5);
      animation:fadeIn 1s ease;
    }

    h1{
      text-align:center;
      color:white;
      margin-bottom:20px;
      font-size:30px;
    }

    label{
      color:white;
      font-size:14px;
      font-weight:600;
      margin-bottom:5px;
      display:block;
    }

    input,
    select{
      width:100%;
      padding:12px;
      border:none;
      outline:none;
      border-radius:8px;
      margin-bottom:15px;
      background:rgba(255,255,255,0.85);
      font-size:14px;
    }

    input:focus,
    select:focus{
      box-shadow:0 0 8px white;
    }

    /* PASSWORD */

    .password-box{
      position:relative;
    }

    .password-box input{
      padding-right:40px;
    }

    .toggle-password{
      position:absolute;
      top:38%;
      right:12px;
      transform:translateY(-50%);
      cursor:pointer;
      font-size:18px;
    }

    /* BUTTON */

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:
      linear-gradient(135deg,#ff7e5f,#feb47b);
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
      background:
      linear-gradient(135deg,#ff6a3d,#fd9f67);
      box-shadow:0 6px 15px rgba(0,0,0,0.3);
    }

    .forgot{
      text-align:right;
      margin-top:-10px;
      margin-bottom:15px;
    }

    .forgot a{
      color:#ffd369;
      text-decoration:none;
      font-size:13px;
    }

    .forgot a:hover{
      text-decoration:underline;
    }

    /* FLOATING BOOK */

    .corner-animation{
      position:absolute;
      bottom:20px;
      right:20px;
      width:60px;
      height:60px;
      background:url('book.png')
      no-repeat center/contain;
      animation:floatBook 3s infinite ease-in-out;
    }

    @keyframes floatBook{

      0%{
        transform:translateY(0)
        rotate(0deg);
      }

      50%{
        transform:translateY(-15px)
        rotate(10deg);
      }

      100%{
        transform:translateY(0)
        rotate(0deg);
      }

    }

    @keyframes fadeIn{

      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

  </style>

</head>

<body>

  <div class="page" id="page">

    <div class="container">

      <h1>📚 Library Login</h1>

      <form id="loginForm">

        <label>Username</label>

        <input
        type="text"
        id="username"
        placeholder="Enter username"
        required>

        <label>Password</label>

        <div class="password-box">

          <input
          type="password"
          id="password"
          placeholder="Enter password"
          required>

          <span
          class="toggle-password"
          onclick="togglePassword()">
          👁
          </span>

        </div>

        <div class="forgot">
          <a href="#">Forgot Password?</a>
        </div>

        <label>Role</label>

        <select id="role">

          <option>User</option>
          <option>Admin</option>

        </select>

        <button type="submit">
          Login
        </button>

      </form>

    </div>

  </div>

  <!-- FLOATING BOOK -->

  <div class="corner-animation"></div>

  <script>
  const form = document.getElementById("loginForm");
  const page = document.getElementById("page");

  form.addEventListener("submit", function (e) {
    e.preventDefault();

    const username =
      document.getElementById("username").value.trim();

    const password =
      document.getElementById("password").value;

    const role =
      document.getElementById("role").value;

    // PASSWORD CHECK
    let correctPassword = "";

    if (role === "Admin") {
      correctPassword = username + "@1212";
    } else {
      correctPassword = username + "@123";
    }

    if (password !== correctPassword) {
      alert("Wrong Password ❌");
      return;
    }

    // SAVE LOGIN USER
    localStorage.setItem("loggedUser", username);

    // UNIQUE USER ID
    let users =
      JSON.parse(localStorage.getItem("users")) || {};

    // AGAR USER PEHLE SE HAI
    if (users[username]) {

      localStorage.setItem(
        "userId",
        users[username].id
      );

    } else {

      // NEW USER
      let randomId =
        "U" + Math.floor(1000 + Math.random() * 9000);

      users[username] = {
        id: randomId
      };

      localStorage.setItem(
        "users",
        JSON.stringify(users)
      );

      localStorage.setItem("userId", randomId);

      // EMPTY BOOKS FOR NEW USER
      localStorage.setItem(
        "issuedBooks_" + username,
        JSON.stringify([])
      );
    }

    // PAGE ANIMATION
    page.classList.add("turn");

    setTimeout(() => {

      if (role === "Admin") {
        window.location.href = "admin.html";
      } else {
        window.location.href = "user.html";
      }

    }, 1000);
  });

  // SHOW/HIDE PASSWORD
  function togglePassword() {

    const passwordInput =
      document.getElementById("password");

    const toggleIcon =
      document.querySelector(".toggle-password");

    if (passwordInput.type === "password") {

      passwordInput.type = "text";
      toggleIcon.textContent = "🙈";

    } else {

      passwordInput.type = "password";
      toggleIcon.textContent = "👁";
    }
  }
</script>

</body>
</html>
