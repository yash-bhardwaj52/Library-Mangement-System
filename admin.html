<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: url('1.webp') no-repeat center center/cover;
      background-attachment: fixed;
      color: #fff;
    }

    /* Navigation */
    nav {
      width: 100%;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 15px 0;
      backdrop-filter: blur(6px);
      box-shadow: 0 3px 8px rgba(0,0,0,0.6);
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    nav a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      font-weight: 500;
      position: relative;
    }
    nav a:hover {
      color: #ffcc00;
    }

    /* Container */
    .container {
      flex: 1;
      padding: 30px;
      text-align: center;
      animation: fadeIn 1.2s ease;
      background: rgba(0,0,0,0.55);
      border-radius: 15px;
      margin: 20px auto;
      width: 90%;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    }
    .container h1 {
      font-size: 38px;
      margin-bottom: 20px;
      text-shadow: 2px 2px 6px black;
    }

    /* Form */
    .book-form {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }
    .book-form input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 16px;
      width: 200px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.7);
    }
    .book-form button {
      padding: 12px 20px;
      background: #ffcc00;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }
    .book-form button:hover {
      background: #ffaa00;
      transform: scale(1.05);
    }

    /* Book List */
    .book-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
    }
    .book-card {
      background: rgba(255,255,255,0.9);
      border-radius: 15px;
      padding: 15px;
      color: #222;
      text-align: left;
      box-shadow: 0 8px 18px rgba(0,0,0,0.8);
      transition: 0.3s;
    }
    .book-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 25px rgba(0,0,0,0.5);
    }
    .book-card h3 {
      margin-bottom: 6px;
      font-size: 20px;
      color: #333;
    }
    .book-card p {
      font-size: 14px;
      color: #555;
    }
    .actions {
      margin-top: 10px;
      display: flex;
      justify-content: space-between;
    }
    .actions button {
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: 0.3s;
    }
    .edit-btn {
      background: #4caf50;
      color: white;
    }
    .edit-btn:hover {
      background: #43a047;
    }
    .delete-btn {
      background: #f44336;
      color: white;
    }
    .delete-btn:hover {
      background: #e53935;
    }

    /* Animations */
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
  <script defer src="script.js"></script>
</head>
<body>
  <nav>
    <a href="admin.html">Home</a>
    <a href="index.html">Logout</a>
  </nav>

  <div class="container">
    <h1>📚 Admin Dashboard</h1>

    <form class="book-form" id="adminBookForm">
      <input type="text" id="bookTitle" placeholder="Book Title" required>
      <input type="text" id="bookAuthor" placeholder="Author" required>
      <button type="submit">Add Book</button>
    </form>

    <div class="book-list" id="adminBookList">
      <div class="book-card">
        <h3>The Great Gatsby</h3>
        <p>F. Scott Fitzgerald</p>
        <div class="actions">
          <button class="edit-btn">Edit</button>
          <button class="delete-btn">Delete</button>
        </div>
      </div>
      <div class="book-card">
        <h3>1984</h3>
        <p>George Orwell</p>
        <div class="actions">
          <button class="edit-btn">Edit</button>
          <button class="delete-btn">Delete</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
